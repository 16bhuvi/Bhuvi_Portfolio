<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhuvi Vishwakarma | Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

[data-theme="dark"]{
 --bg:#0c0c12;--surface:#181824;--border:#2a2a3e;
 --accent:#8b7cf8;--text:#f0f0f8;--text2:#c8c8e0;
}
[data-theme="light"]{
 --bg:#f8f8ff;--surface:#ffffff;--border:#dcdcf0;
 --accent:#6c5ce7;--text:#1a1a2e;--text2:#3a3a5a;
}

body{
 font-family:Arial,sans-serif;
 background:var(--bg);color:var(--text);
}

/* NAV */
nav{
 position:fixed;top:0;width:100%;
 display:flex;justify-content:space-between;
 padding:15px 5%;background:var(--bg);
 border-bottom:1px solid var(--border);
}
.nav-btn{
 background:none;border:none;color:var(--text2);
 margin:0 8px;cursor:pointer;
}
.nav-btn.active{color:var(--accent);}

/* SECTION */
section{display:none;padding:100px 5%;}
section.active{display:block;}

/* HERO */
#hero h1{font-size:3rem;}
button{padding:10px 20px;margin-top:10px;cursor:pointer}

/* PROJECT CARD */
.card{
 border:1px solid var(--border);
 padding:20px;margin:10px 0;
 cursor:pointer;
}

/* MODAL */
.modal{
 position:fixed;inset:0;background:rgba(0,0,0,0.7);
 display:none;align-items:center;justify-content:center;
}
.modal-box{
 background:var(--surface);padding:20px;width:90%;max-width:500px;
}
</style>
</head>

<body>

<nav>
  <div><b>BV</b></div>
  <div>
    <button class="nav-btn active" onclick="showSection('hero',this)">Home</button>
    <button class="nav-btn" onclick="showSection('projects',this)">Projects</button>
    <button class="nav-btn" onclick="showSection('contact',this)">Contact</button>
  </div>
</nav>

<!-- HERO -->
<section id="hero" class="active">
  <h1>Bhuvi Vishwakarma</h1>
  <p>Software Engineer · Web Developer</p>
  <button onclick="showSection('projects')">View Projects</button>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="card" onclick="openModal('banverse')">
    BanVerse - AI Platform
  </div>

  <div class="card" onclick="openModal('scraper')">
    Data Scraper
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Email: bhuvi162005@gmail.com</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="m-title"></h3>
    <p id="m-desc"></p>
    <ul id="m-points"></ul>
    <div id="m-btns"></div>
    <br>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// NAVIGATION
function showSection(id, btn){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');

 document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
 if(btn) btn.classList.add('active');
}

// PROJECT DATA
const projects={
 banverse:{
  name:"BanVerse",
  desc:"AI-powered student platform.",
  points:["Chatbot","UI/UX","Deployment"],
  live:"https://bv-ban-verse.vercel.app/",
  github:"https://github.com/16bhuvi/Ban-Verse"
 },
 scraper:{
  name:"Scraper",
  desc:"Python web scraper.",
  points:["Automation","MongoDB","API"],
  live:null,
  github:"https://github.com/16bhuvi/Web_Scrapping"
 }
};

// OPEN MODAL
function openModal(id){
 const p=projects[id];

 document.getElementById("m-title").textContent=p.name;
 document.getElementById("m-desc").textContent=p.desc;

 document.getElementById("m-points").innerHTML=
  p.points.map(pt=>`<li>${pt}</li>`).join("");

 let btns="";
 if(p.live) btns+=`<a href="${p.live}" target="_blank">Live</a><br>`;
 if(p.github) btns+=`<a href="${p.github}" target="_blank">GitHub</a>`;

 document.getElementById("m-btns").innerHTML=btns;

 document.getElementById("modal").style.display="flex";
}

// CLOSE MODAL
function closeModal(){
 document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
